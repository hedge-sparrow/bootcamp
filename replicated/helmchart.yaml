apiVersion: kots.io/v1beta2
kind: HelmChart
metadata:
  name: bootcamp
spec:
  chart:
    name: bootcamp
    chartVersion: 0.1.0
  values:
    secrets:
      uploadAdminToken: repl{{ ConfigOption "upload_admin_token" }}
    postgres:
      storage:
        size: repl{{ ConfigOption "postgres_storage_size" }}
    upload:
      ttl: repl{{ ConfigOption "upload_ttl" }}
      maxUploadBytes: repl{{ ConfigOption "upload_max_bytes" }}
      storage:
        size: repl{{ ConfigOption "upload_storage_size" }}
  builder:
    image:
      repository: bootcamp/web
      tag: "0.1.0"
    upload:
      image:
        repository: codeberg.org/sparrow/upload
        tag: "v1.1.1"
    postgres:
      instances: 1
