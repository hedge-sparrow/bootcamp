apiVersion: kots.io/v1beta1
kind: Config
metadata:
  name: bootcamp-config
spec:
  groups:
    - name: authentication
      title: Authentication
      items:
        - name: upload_admin_token
          type: password
          title: Upload Service Admin Token
          hidden: true
          default: repl{{ RandomString 64 }}

        - name: admin_password
          type: password
          title: Admin Password
          help_text: >-
            Password for the built-in admin account, set once on first install.
            After installation this can only be changed from within the application.
            Must be at least 8 characters.
          required: true
          default: repl{{ RandomString 32 }}
          validation:
            regex:
              pattern: ".{8,}"
              message: "Admin password must be at least 8 characters."

    - name: database
      title: Database
      items:
        - name: postgres_type
          type: radio
          title: PostgreSQL
          help_text: >-
            Choose Embedded to deploy a PostgreSQL cluster managed by CloudNativePG
            inside the cluster. Choose External to connect to an existing PostgreSQL
            instance you manage (connection URL required).
          required: true
          default: internal
          items:
            - name: internal
              title: "Embedded (CloudNativePG)"
            - name: external
              title: "External PostgreSQL"
        - name: external_database_url
          type: password
          title: PostgreSQL Connection URL
          help_text: >-
            Connection URL for the external PostgreSQL instance
            (e.g. postgres://user:pass@host:5432/db).
          required: true
          when: 'repl{{ ConfigOptionEquals "postgres_type" "external" }}'

    - name: storage
      title: Storage
      when: 'repl{{ ConfigOptionEquals "postgres_type" "internal" }}'
      items:
        - name: postgres_storage_size
          type: text
          title: Database Storage Size
          default: "5Gi"
          help_text: >-
            Size of the PersistentVolumeClaim for the PostgreSQL cluster
            (e.g. 5Gi, 20Gi).
          required: true

        - name: upload_storage_size
          type: text
          title: File Storage Size
          default: "10Gi"
          help_text: >-
            Size of the PersistentVolumeClaim for uploaded files
            (e.g. 10Gi, 100Gi).
          required: true
          when: 'repl{{ ConfigOptionEquals "upload_type" "internal" }}'

    - name: upload_settings
      title: Upload Settings
      items:
        - name: upload_type
          type: radio
          title: Upload Service
          help_text: >-
            Choose Embedded to deploy the built-in upload service inside the cluster.
            Choose External to use a separately hosted upload service instance
            (URL and admin token required).
          required: true
          default: internal
          items:
            - name: internal
              title: "Embedded"
            - name: external
              title: "External"

        - name: upload_service_url
          type: text
          title: Upload Service URL
          help_text: >-
            Base URL of the external upload service
            (e.g. https://upload.example.com).
          required: true
          when: 'repl{{ ConfigOptionEquals "upload_type" "external" }}'

        - name: external_upload_admin_token
          type: password
          title: Upload Service Admin Token
          help_text: >-
            Admin token for the external upload service. This must match the
            token configured on the external service.
          required: true
          when: 'repl{{ ConfigOptionEquals "upload_type" "external" }}'

        - name: allow_private_uploads
          type: bool
          title: Allow Private Uploads
          default: "1"
          help_text: >-
            When enabled, users can mark uploaded files as private so they are
            only accessible to the uploader.

        - name: allow_single_use_links
          type: bool
          title: Allow Single-Use Links
          default: "1"
          help_text: >-
            When enabled, users can create single-use download links that are
            deleted after the first access.

        - name: upload_ttl
          type: text
          title: File TTL
          default: ""
          help_text: >-
            How long uploaded files are retained before automatic deletion
            (e.g. 24h, 7d). Leave empty to use the upload service default (24h).
          required: false
          when: 'repl{{ LicenseFieldValue "allow_advanced_uploads" }}'

        - name: upload_max_bytes
          type: text
          title: Maximum Upload Size
          default: ""
          help_text: >-
            Maximum file upload size in bytes. Leave empty to use the default
            (2 GiB).
          required: false
          when: 'repl{{ LicenseFieldValue "allow_advanced_uploads" }}'

    - name: ingress
      title: Ingress
      items:
        - name: ingress_type
          type: radio
          title: Access Method
          help_text: >-
            Choose how the application is exposed. Traefik (HTTP) uses the built-in
            ingress controller without TLS. Traefik (HTTPS) automatically provisions
            a Let's Encrypt certificate (hostname and email required). NodePort exposes
            the app directly on a cluster port without an ingress controller.
          default: traefik_http
          required: true
          items:
            - name: traefik_http
              title: "Traefik (HTTP)"
            - name: traefik_https
              title: "Traefik (HTTPS, Let's Encrypt)"
            - name: nodeport
              title: "NodePort (no ingress controller)"

        - name: hostname
          type: text
          title: Hostname
          help_text: >-
            The hostname the application will be served on (e.g. files.example.com).
            Must have a DNS A record pointing at the cluster's public IP.
          required: true
          when: 'repl{{ ConfigOptionNotEquals "ingress_type" "nodeport" }}'

        - name: nodeport_port
          type: text
          title: Port
          help_text: >-
            NodePort to expose the web UI on (e.g. 80 or 30080). Leave empty for
            Kubernetes to auto-assign a port from the cluster's NodePort range.
          required: false
          when: 'repl{{ ConfigOptionEquals "ingress_type" "nodeport" }}'

        - name: acme_email
          type: text
          title: Let's Encrypt Email
          help_text: >-
            Email address used for Let's Encrypt certificate notifications and
            account registration.
          required: true
          when: 'repl{{ ConfigOptionEquals "ingress_type" "traefik_https" }}'
