apiVersion: kots.io/v1beta2
kind: HelmChart
metadata:
  name: traefik
  annotations:
    kots.io/exclude: 'repl{{ ConfigOptionEquals "ingress_type" "nodeport" }}'
spec:
  chart:
    name: traefik
    chartVersion: 33.0.0
  weight: 1
  values:
    providers:
      kubernetesGateway:
        enabled: true
    ingressClass:
      enabled: false
    gateway:
      enabled: false
    service:
      type: NodePort
    ports:
      web:
        nodePort: 80
      websecure:
        nodePort: 443
    # ports.web.redirectTo is intentionally absent — HTTP→HTTPS redirect is
    # handled by the HTTPRoute RequestRedirect filter when ingress_type=traefik_https.
    persistence:
      enabled: true
      size: 128Mi
      path: /data
  optionalValues:
    - when: 'repl{{ ConfigOptionEquals "ingress_type" "traefik_https" }}'
      recursiveMerge: true
      values:
        certificatesResolvers:
          letsencrypt:
            acme:
              email: repl{{ ConfigOption "acme_email" }}
              storage: /data/acme.json
              httpChallenge:
                entryPoint: web
  builder: {}
