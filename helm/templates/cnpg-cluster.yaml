apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "bootcamp.pgClusterName" . }}
  labels:
    {{- include "bootcamp.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.postgres.instances }}
  enableSuperuserAccess: false
  bootstrap:
    initdb:
      database: {{ .Values.postgres.database }}
      owner: {{ .Values.postgres.user }}
  storage:
    size: {{ .Values.postgres.storage.size }}
    {{- with .Values.postgres.storage.storageClass }}
    storageClass: {{ . }}
    {{- end }}
