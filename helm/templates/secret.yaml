apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bootcamp.fullname" . }}
  labels:
    {{- include "bootcamp.labels" . | nindent 4 }}
type: Opaque
stringData:
  UPLOAD_ADMIN_TOKEN: {{ .Values.secrets.uploadAdminToken | quote }}
  {{- if not .Values.postgres.internal }}
  DATABASE_URL: {{ .Values.secrets.databaseURL | quote }}
  {{- end }}
