replicaCount: 1

image:
  repository: ghcr.io/ashjones-replicated/bootcamp
  pullPolicy: IfNotPresent
  # Overrides the image tag; defaults to Chart appVersion.
  tag: "main"

service:
  type: ClusterIP
  port: 80

config:
  bindAddress: ":8080"
  # Defaults to the internal upload service URL derived from the release name.
  # Override only if pointing at an external upload service.
  uploadServiceURL: ""
  cookieSecure: "true"
  # Override only if the Replicated SDK is not running at the default service address.
  replicatedSDKURL: ""

# Sensitive values — override via --set or a separate values file; never commit real values.
secrets:
  uploadAdminToken: ""
  # PostgreSQL connection URL. Required when postgres.internal is false.
  databaseURL: ""

# CloudNativePG Postgres cluster
postgres:
  # Set to false to use an external PostgreSQL instance.
  internal: true
  # The following fields are only used when internal is true.
  instances: 1
  database: bootcamp
  user: bootcamp
  storage:
    size: 5Gi
    # storageClass: ""

# Upload service
upload:
  image:
    repository: codeberg.org/sparrow/upload
    tag: "v2.0.0"
    pullPolicy: IfNotPresent
  # File TTL — empty string falls back to the upload service default (24h).
  ttl: ""
  # Max upload size in bytes (default 2 GiB).
  maxUploadBytes: ""
  storage:
    size: 10Gi
    # storageClass: ""
  resources:
    limits:
      memory: 256Mi
    requests:
      memory: 64Mi
      cpu: 50m

ingress:
  enabled: true
  # Hostname the application is served on.
  host: ""
  # Enable TLS via the Traefik letsencrypt cert resolver.
  tls: false
  # Extra annotations merged onto the Ingress resource.
  annotations: {}

resources:
  limits:
    memory: 256Mi
  requests:
    memory: 128Mi
    cpu: 100m
  # CPU limits are intentionally omitted — they cause throttling without benefit.

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# Values passed to the Replicated SDK subchart.
# See https://docs.replicated.com/vendor/replicated-sdk-customizing for all options.
# license, channel, and release metadata are injected automatically by Replicated at install time.
replicated:
  statusInformers:
    - deployment/bootcamp
    - deployment/bootcamp-upload

# Values passed to the cloudnative-pg operator subchart.
# See https://cloudnative-pg.github.io/charts for available options.
cloudnative-pg: {}

# Values passed to the Traefik ingress controller subchart.
# See https://github.com/traefik/traefik-helm-chart for all options.
traefik:
  ingressClass:
    enabled: true
    isDefaultClass: true
  # ports.web.redirectTo is intentionally absent from defaults — it redirects ALL
  # HTTP traffic to HTTPS cluster-wide. Enable it only when ingress.tls is true.
  certificatesResolvers:
    letsencrypt:
      acme:
        # Required: set to a valid email address for Let's Encrypt notifications.
        email: ""
        storage: /data/acme.json
        httpChallenge:
          entryPoint: web
  persistence:
    enabled: true
    size: 128Mi
    path: /data
