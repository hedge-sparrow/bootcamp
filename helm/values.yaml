replicaCount: 1

image:
  repository: ghcr.io/ashjones-replicated/bootcamp
  pullPolicy: IfNotPresent
  # Overrides the image tag; defaults to Chart appVersion.
  tag: ""

service:
  type: ClusterIP
  port: 80
  # nodePort is only used when type is NodePort. Leave unset for auto-assignment.
  nodePort: null

config:
  bindAddress: ":8080"
  # Defaults to the internal upload service URL derived from the release name.
  # Override only if pointing at an external upload service.
  uploadServiceURL: ""
  cookieSecure: "true"
  # Override only if the Replicated SDK is not running at the default service address.
  replicatedSDKURL: ""

# Sensitive values — override via --set or a separate values file; never commit real values.
secrets:
  uploadAdminToken: ""
  # Preset password for the admin user. If empty, a random password is generated
  # on first start and printed to the pod logs.
  adminPassword: ""
  # PostgreSQL connection URL. Required when postgres.internal is false.
  databaseURL: ""

# CloudNativePG Postgres cluster
postgres:
  # Set to false to use an external PostgreSQL instance.
  internal: true
  # The following fields are only used when internal is true.
  instances: 1
  database: bootcamp
  user: bootcamp
  storage:
    size: 5Gi
    # storageClass: ""
  image:
    repository: ghcr.io/cloudnative-pg/postgresql
    tag: "16.6"

# Upload service
upload:
  # Set to false to use an external upload service; provide config.uploadServiceURL.
  internal: true
  image:
    repository: codeberg.org/sparrow/upload
    tag: "v2.0.0"
    pullPolicy: IfNotPresent
  # File TTL — empty string falls back to the upload service default (24h).
  ttl: ""
  # Max upload size in bytes (default 2 GiB).
  maxUploadBytes: ""
  storage:
    size: 10Gi
    # storageClass: ""
  resources:
    limits:
      memory: 256Mi
    requests:
      memory: 64Mi
      cpu: 50m

gateway:
  # Hostname the application is served on.
  host: ""
  # Enable TLS via the Traefik letsencrypt cert resolver.
  tls: false

resources:
  limits:
    memory: 256Mi
  requests:
    memory: 128Mi
    cpu: 100m
  # CPU limits are intentionally omitted — they cause throttling without benefit.

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# Values passed to the Replicated SDK subchart.
# See https://docs.replicated.com/vendor/replicated-sdk-customizing for all options.
# license, channel, and release metadata are injected automatically by Replicated at install time.
replicated:
  statusInformers:
    - deployment/bootcamp
    - deployment/bootcamp-upload

# Global values. Replicated injects global.replicated.* at install time.
# Set proxy.registryDomain to route all images through the Replicated proxy.
# Leave empty for direct registry access (local development).
global:
  replicated:
    proxy:
      registryDomain: ""
